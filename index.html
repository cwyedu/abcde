<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>二分搜尋猜數字</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;700;800&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0a0a0f;
      --surface: #13131a;
      --border: #2a2a3a;
      --accent: #00f5a0;
      --accent2: #00d4ff;
      --warn: #ff6b6b;
      --text: #e8e8f0;
      --muted: #4a4a6a;
      --eliminated: #1a1a22;
      --in-range: #1e2a1e;
      --cell-size: 52px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Space Mono', monospace;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem 1rem 4rem;
      position: relative;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 60% 40% at 20% 10%, rgba(0,245,160,0.06) 0%, transparent 60%),
        radial-gradient(ellipse 50% 50% at 80% 90%, rgba(0,212,255,0.06) 0%, transparent 60%);
      pointer-events: none;
      z-index: 0;
    }

    .container {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 700px;
      display: flex;
      flex-direction: column;
      gap: 2rem;
    }

    /* ─── Header ─── */
    header {
      text-align: center;
    }
    .title-tag {
      font-family: 'Space Mono', monospace;
      font-size: 0.7rem;
      letter-spacing: 0.25em;
      color: var(--accent);
      text-transform: uppercase;
      margin-bottom: 0.5rem;
      opacity: 0.8;
    }
    h1 {
      font-family: 'Syne', sans-serif;
      font-size: clamp(1.8rem, 5vw, 2.8rem);
      font-weight: 800;
      letter-spacing: -0.02em;
      line-height: 1.1;
      background: linear-gradient(135deg, var(--accent) 0%, var(--accent2) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .subtitle {
      margin-top: 0.5rem;
      font-size: 0.78rem;
      color: var(--muted);
      letter-spacing: 0.05em;
    }

    /* ─── Stats bar ─── */
    .stats-bar {
      display: flex;
      gap: 1rem;
      justify-content: center;
    }
    .stat {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0.5rem 1.2rem;
      text-align: center;
      flex: 1;
      max-width: 160px;
    }
    .stat-label {
      font-size: 0.6rem;
      letter-spacing: 0.15em;
      color: var(--muted);
      text-transform: uppercase;
    }
    .stat-value {
      font-family: 'Syne', sans-serif;
      font-size: 1.4rem;
      font-weight: 700;
      color: var(--accent);
      margin-top: 0.1rem;
      transition: color 0.3s;
    }

    /* ─── Number grid ─── */
    .grid-wrapper {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 1.5rem;
      position: relative;
      overflow: hidden;
    }
    .grid-wrapper::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(0,245,160,0.03) 0%, transparent 50%);
      pointer-events: none;
    }
    .grid-label {
      font-size: 0.62rem;
      letter-spacing: 0.2em;
      color: var(--muted);
      text-transform: uppercase;
      margin-bottom: 1rem;
    }
    #number-grid {
      display: grid;
      grid-template-columns: repeat(10, 1fr);
      gap: 6px;
    }

    .num-cell {
      aspect-ratio: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.78rem;
      font-weight: 700;
      border-radius: 8px;
      border: 1px solid transparent;
      background: rgba(255,255,255,0.04);
      color: var(--text);
      transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
      cursor: default;
      position: relative;
      user-select: none;
    }

    .num-cell.in-range {
      background: rgba(0, 245, 160, 0.08);
      border-color: rgba(0, 245, 160, 0.25);
      color: var(--accent);
      cursor: pointer;
    }
    .num-cell.in-range:hover {
      background: rgba(0, 245, 160, 0.22);
      border-color: rgba(0, 245, 160, 0.6);
      transform: scale(1.18);
      box-shadow: 0 0 12px rgba(0,245,160,0.3);
      z-index: 3;
    }
    .num-cell.selected-preview {
      background: rgba(255, 220, 0, 0.22);
      border-color: rgba(255, 220, 0, 0.7);
      color: #ffd700;
      cursor: pointer;
      transform: scale(1.18);
      box-shadow: 0 0 14px rgba(255,220,0,0.35);
      z-index: 4;
    }

    .num-cell.eliminated {
      background: var(--eliminated);
      border-color: transparent;
      color: var(--muted);
      opacity: 0.3;
      transform: scale(0.9);
    }

    .num-cell.guessed-high {
      background: rgba(255, 107, 107, 0.12);
      border-color: rgba(255, 107, 107, 0.3);
      color: var(--warn);
      animation: pulse-warn 0.5s ease;
    }

    .num-cell.guessed-low {
      background: rgba(0, 212, 255, 0.12);
      border-color: rgba(0, 212, 255, 0.3);
      color: var(--accent2);
      animation: pulse-info 0.5s ease;
    }

    .num-cell.correct {
      background: linear-gradient(135deg, rgba(0,245,160,0.3), rgba(0,212,255,0.3));
      border-color: var(--accent);
      color: #fff;
      animation: pop-correct 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
      z-index: 2;
    }

    @keyframes pulse-warn {
      0% { transform: scale(1); }
      50% { transform: scale(1.2); }
      100% { transform: scale(1); }
    }
    @keyframes pulse-info {
      0% { transform: scale(1); }
      50% { transform: scale(1.2); }
      100% { transform: scale(1); }
    }
    @keyframes pop-correct {
      0% { transform: scale(1); }
      40% { transform: scale(1.5); }
      100% { transform: scale(1.15); }
    }

    /* ─── Range indicator ─── */
    .range-display {
      margin-top: 1rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 0.72rem;
      color: var(--muted);
    }
    .range-bar {
      flex: 1;
      height: 4px;
      background: var(--border);
      border-radius: 2px;
      position: relative;
      overflow: hidden;
    }
    .range-fill {
      position: absolute;
      height: 100%;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      border-radius: 2px;
      transition: left 0.5s ease, width 0.5s ease;
    }

    /* ─── Click-to-guess panel ─── */
    .input-hint {
      font-size: 0.62rem;
      letter-spacing: 0.2em;
      color: var(--muted);
      text-transform: uppercase;
    }
    .confirm-row {
      display: flex;
      align-items: center;
      gap: 1rem;
    }
    .selected-display {
      flex: 1;
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 0.6rem 1rem;
      text-align: center;
      font-family: 'Syne', sans-serif;
      font-size: 1.5rem;
      font-weight: 800;
      color: #ffd700;
      letter-spacing: 0.08em;
      min-width: 80px;
      transition: border-color 0.2s, color 0.2s;
    }
    .selected-display.empty-sel {
      color: var(--muted);
      font-size: 0.85rem;
      font-family: 'Space Mono', monospace;
      font-weight: 400;
      letter-spacing: 0.05em;
    }
    .input-area {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 1.25rem 1.5rem;
      display: flex;
      flex-direction: column;
      gap: 0.85rem;
    }

    #guess-btn {
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border: none;
      border-radius: 10px;
      color: #0a0a0f;
      font-family: 'Syne', sans-serif;
      font-size: 0.9rem;
      font-weight: 700;
      letter-spacing: 0.05em;
      padding: 0.75rem 1.5rem;
      cursor: pointer;
      transition: transform 0.15s, box-shadow 0.15s, opacity 0.2s;
      white-space: nowrap;
    }
    #guess-btn:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(0,245,160,0.3);
    }
    #guess-btn:active:not(:disabled) { transform: translateY(0); }
    #guess-btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
      transform: none;
    }

    /* ─── Feedback message ─── */
    #feedback {
      font-family: 'Syne', sans-serif;
      font-size: 1rem;
      font-weight: 700;
      text-align: center;
      min-height: 1.4em;
      letter-spacing: 0.03em;
      transition: opacity 0.3s;
    }
    #feedback.too-high { color: var(--warn); }
    #feedback.too-low  { color: var(--accent2); }
    #feedback.correct  { color: var(--accent); }
    #feedback.empty    { opacity: 0; }

    /* ─── History log ─── */
    .history-section {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 1.5rem;
    }
    .history-label {
      font-size: 0.62rem;
      letter-spacing: 0.2em;
      color: var(--muted);
      text-transform: uppercase;
      margin-bottom: 0.75rem;
    }
    #history-list {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      min-height: 2rem;
    }
    .history-tag {
      font-size: 0.72rem;
      font-weight: 700;
      padding: 0.25rem 0.6rem;
      border-radius: 6px;
      border: 1px solid;
      animation: tag-in 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    .history-tag.high {
      background: rgba(255,107,107,0.1);
      border-color: rgba(255,107,107,0.3);
      color: var(--warn);
    }
    .history-tag.low {
      background: rgba(0,212,255,0.1);
      border-color: rgba(0,212,255,0.3);
      color: var(--accent2);
    }
    .history-tag.win {
      background: rgba(0,245,160,0.15);
      border-color: var(--accent);
      color: var(--accent);
    }
    @keyframes tag-in {
      from { transform: scale(0.7); opacity: 0; }
      to   { transform: scale(1);   opacity: 1; }
    }

    /* ─── Win overlay ─── */
    #win-overlay {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 100;
      background: rgba(10,10,15,0.85);
      backdrop-filter: blur(8px);
      align-items: center;
      justify-content: center;
    }
    #win-overlay.show { display: flex; }
    #fireworks-canvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 0;
    }
    .win-card { position: relative; z-index: 1; }
    .win-card {
      background: var(--surface);
      border: 1px solid var(--accent);
      border-radius: 24px;
      padding: 3rem 2.5rem;
      text-align: center;
      max-width: 400px;
      width: 90%;
      box-shadow: 0 0 60px rgba(0,245,160,0.2);
      animation: card-in 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    @keyframes card-in {
      from { transform: scale(0.7) translateY(40px); opacity: 0; }
      to   { transform: scale(1) translateY(0); opacity: 1; }
    }
    .win-emoji { font-size: 3.5rem; margin-bottom: 0.5rem; }
    .win-title {
      font-family: 'Syne', sans-serif;
      font-size: 1.8rem;
      font-weight: 800;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 0.5rem;
    }
    .win-detail {
      font-size: 0.85rem;
      color: var(--muted);
      margin-bottom: 0.5rem;
    }
    .win-tries {
      font-family: 'Syne', sans-serif;
      font-size: 3rem;
      font-weight: 800;
      color: var(--accent);
      line-height: 1;
    }
    .win-tries-label {
      font-size: 0.72rem;
      letter-spacing: 0.2em;
      color: var(--muted);
      text-transform: uppercase;
      margin-bottom: 2rem;
    }
    #restart-btn {
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border: none;
      border-radius: 12px;
      color: #0a0a0f;
      font-family: 'Syne', sans-serif;
      font-size: 1rem;
      font-weight: 700;
      padding: 0.85rem 2.5rem;
      cursor: pointer;
      letter-spacing: 0.05em;
      transition: transform 0.15s, box-shadow 0.15s;
    }
    #restart-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(0,245,160,0.35);
    }

    /* ─── Legend ─── */
    .legend {
      display: flex;
      gap: 1rem;
      flex-wrap: wrap;
      justify-content: center;
      font-size: 0.65rem;
      letter-spacing: 0.05em;
      color: var(--muted);
    }
    .legend-item {
      display: flex;
      align-items: center;
      gap: 0.35rem;
    }
    .legend-dot {
      width: 10px; height: 10px;
      border-radius: 3px;
      border: 1px solid;
    }
    .ld-range  { background: rgba(0,245,160,0.15); border-color: rgba(0,245,160,0.5); }
    .ld-elim   { background: rgba(255,255,255,0.03); border-color: transparent; opacity: 0.4; }
    .ld-high   { background: rgba(255,107,107,0.15); border-color: rgba(255,107,107,0.5); }
    .ld-low    { background: rgba(0,212,255,0.15); border-color: rgba(0,212,255,0.5); }
    .ld-win    { background: rgba(0,245,160,0.3); border-color: var(--accent); }
  </style>
</head>
<body>

<div class="container">

  <!-- Header -->
  <header>
    <div class="title-tag">// Algorithm Visualization</div>
    <h1>二分搜尋<br>猜數字</h1>
    <p class="subtitle">Binary Search · Guess the Number · 1 – 100</p>
  </header>

  <!-- Stats -->
  <div class="stats-bar">
    <div class="stat">
      <div class="stat-label">猜測次數</div>
      <div class="stat-value" id="tries-display">0</div>
    </div>
    <div class="stat">
      <div class="stat-label">搜尋範圍</div>
      <div class="stat-value" id="range-display">1–100</div>
    </div>
    <div class="stat">
      <div class="stat-label">剩餘候選</div>
      <div class="stat-value" id="remain-display">100</div>
    </div>
  </div>

  <!-- Number grid -->
  <div class="grid-wrapper">
    <div class="grid-label">// 數字範圍視覺化</div>
    <div id="number-grid"></div>
    <div class="range-display">
      <span id="range-low-label">1</span>
      <div class="range-bar">
        <div class="range-fill" id="range-fill"></div>
      </div>
      <span id="range-high-label">100</span>
    </div>
  </div>

  <!-- Legend -->
  <div class="legend">
    <div class="legend-item"><div class="legend-dot ld-range"></div><span>有效範圍</span></div>
    <div class="legend-item"><div class="legend-dot ld-elim"></div><span>已排除</span></div>
    <div class="legend-item"><div class="legend-dot ld-high"></div><span>猜測太大</span></div>
    <div class="legend-item"><div class="legend-dot ld-low"></div><span>猜測太小</span></div>
    <div class="legend-item"><div class="legend-dot ld-win"></div><span>答案</span></div>
  </div>

  <!-- Input area -->
  <div class="input-area">
    <div class="input-hint">// 直接點選上方數字進行猜測</div>
    <div id="feedback" class="empty">—</div>
  </div>

  <!-- History -->
  <div class="history-section">
    <div class="history-label">// 猜測歷史</div>
    <div id="history-list"></div>
  </div>

</div>

<!-- Win overlay -->
<div id="win-overlay">
  <canvas id="fireworks-canvas"></canvas>
  <div class="win-card">
    <div class="win-emoji">🎯</div>
    <div class="win-title">Bingo! You got it!</div>
    <div class="win-detail">你找到了答案</div>
    <div class="win-tries" id="win-tries-num">—</div>
    <div class="win-tries-label">次猜測</div>
    <button id="restart-btn" onclick="initGame()">再玩一次 ↺</button>
  </div>
</div>

<script>
  let secret, low, high, tries, gameOver, selectedNum;

  function initGame() {
    secret      = Math.floor(Math.random() * 100) + 1;
    low         = 1;
    high        = 100;
    tries       = 0;
    gameOver    = false;
    selectedNum = null;

    document.getElementById('win-overlay').classList.remove('show');
    if (fwAnimId) { cancelAnimationFrame(fwAnimId); fwAnimId = null; }
    const ctx = document.getElementById('fireworks-canvas').getContext('2d');
    ctx.clearRect(0, 0, 9999, 9999);
    document.getElementById('history-list').innerHTML = '';
    setFeedback('', '');
    updateStats();
    buildGrid();
  }

  function buildGrid() {
    const grid = document.getElementById('number-grid');
    grid.innerHTML = '';
    for (let i = 1; i <= 100; i++) {
      const cell = document.createElement('div');
      cell.className = 'num-cell in-range';
      cell.id = `cell-${i}`;
      cell.textContent = i;
      cell.addEventListener('click', () => onCellClick(i));
      grid.appendChild(cell);
    }
    updateRangeBar();
  }

  function onCellClick(num) {
    if (gameOver) return;
    const cell = document.getElementById(`cell-${num}`);
    if (!cell.classList.contains('in-range')) return;
    selectedNum = num;
    submitGuess();
  }

  function setSelectedDisplay(num) {
    const el = document.getElementById('selected-display');
    if (num === null) {
      el.textContent = '點選數字…';
      el.className = 'selected-display empty-sel';
    } else {
      el.textContent = num;
      el.className = 'selected-display';
    }
  }

  function updateGrid(guess, result) {
    for (let i = 1; i <= 100; i++) {
      const cell = document.getElementById(`cell-${i}`);
      cell.classList.remove('guessed-high', 'guessed-low', 'correct', 'in-range', 'eliminated', 'selected-preview');
      // re-attach click for in-range cells
      if (result === 'correct' && i === guess) {
        cell.classList.add('correct');
      } else if (i < low || i > high) {
        cell.classList.add('eliminated');
      } else if (result === 'high' && i === guess) {
        cell.classList.add('guessed-high');
      } else if (result === 'low' && i === guess) {
        cell.classList.add('guessed-low');
      } else {
        cell.classList.add('in-range');
      }
    }
    updateRangeBar();
  }

  function updateRangeBar() {
    const fill = document.getElementById('range-fill');
    const l = ((low - 1) / 100) * 100;
    const w = ((high - low + 1) / 100) * 100;
    fill.style.left  = l + '%';
    fill.style.width = w + '%';
    document.getElementById('range-low-label').textContent  = low;
    document.getElementById('range-high-label').textContent = high;
  }

  function updateStats() {
    document.getElementById('tries-display').textContent  = tries;
    document.getElementById('range-display').textContent  = `${low}–${high}`;
    document.getElementById('remain-display').textContent = high - low + 1;
  }

  function setFeedback(msg, type) {
    const el = document.getElementById('feedback');
    el.textContent = msg || '—';
    el.className   = type || 'empty';
  }

  function addHistory(guess, type) {
    const list = document.getElementById('history-list');
    const tag  = document.createElement('span');
    tag.className = `history-tag ${type}`;
    const icons = { high: '↓ ', low: '↑ ', win: '✓ ' };
    tag.textContent = (icons[type] || '') + guess;
    list.appendChild(tag);
  }

  function submitGuess() {
    if (gameOver || selectedNum === null) return;
    const val = selectedNum;
    selectedNum = null;

    tries++;

    if (val > secret) {
      high = Math.min(high, val - 1);
      setFeedback(`${val} 太大了！ ▼`, 'too-high');
      updateGrid(val, 'high');
      addHistory(val, 'high');
    } else if (val < secret) {
      low = Math.max(low, val + 1);
      setFeedback(`${val} 太小了！ ▲`, 'too-low');
      updateGrid(val, 'low');
      addHistory(val, 'low');
    } else {
      gameOver = true;
      updateGrid(val, 'correct');
      addHistory(val, 'win');
      setFeedback(`🎯 Bingo! 答案是 ${val}！`, 'correct');
      setTimeout(() => {
        document.getElementById('win-tries-num').textContent = tries;
        document.getElementById('win-overlay').classList.add('show');
        launchFireworks();
      }, 800);
    }

    updateStats();
  }

  /* ── Fireworks ── */
  let fwAnimId = null;
  const COLORS = ['#00f5a0','#00d4ff','#ffd700','#ff6b6b','#ff9ecd','#ffffff','#a78bfa'];

  function launchFireworks() {
    const canvas = document.getElementById('fireworks-canvas');
    const ctx = canvas.getContext('2d');
    canvas.width  = canvas.offsetWidth;
    canvas.height = canvas.offsetHeight;
    const W = canvas.width, H = canvas.height;

    const particles = [];

    function Particle(x, y, color, vx, vy, size, life) {
      return { x, y, color, vx, vy, size, life, maxLife: life, alpha: 1 };
    }

    function explode(x, y) {
      const color = COLORS[Math.floor(Math.random() * COLORS.length)];
      const count = 70 + Math.floor(Math.random() * 40);
      for (let i = 0; i < count; i++) {
        const angle = (Math.PI * 2 * i) / count + (Math.random() - 0.5) * 0.4;
        const speed = 2 + Math.random() * 5;
        particles.push(Particle(
          x, y, color,
          Math.cos(angle) * speed,
          Math.sin(angle) * speed,
          1.5 + Math.random() * 2,
          60 + Math.floor(Math.random() * 40)
        ));
      }
      // trailing streaks
      const trail = COLORS[Math.floor(Math.random() * COLORS.length)];
      for (let i = 0; i < 12; i++) {
        const angle = Math.random() * Math.PI * 2;
        const speed = 1 + Math.random() * 3;
        particles.push(Particle(x, y, trail, Math.cos(angle)*speed, Math.sin(angle)*speed, 3, 30));
      }
    }

    let launches = 0;
    const maxLaunches = 18;
    const launchInterval = setInterval(() => {
      const x = W * (0.15 + Math.random() * 0.7);
      const y = H * (0.1  + Math.random() * 0.5);
      explode(x, y);
      launches++;
      if (launches >= maxLaunches) clearInterval(launchInterval);
    }, 300);

    function tick() {
      ctx.clearRect(0, 0, W, H);
      for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i];
        p.x  += p.vx;
        p.y  += p.vy;
        p.vy += 0.08;          // gravity
        p.vx *= 0.97;
        p.life--;
        p.alpha = p.life / p.maxLife;
        if (p.life <= 0) { particles.splice(i, 1); continue; }
        ctx.globalAlpha = p.alpha;
        ctx.fillStyle   = p.color;
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.globalAlpha = 1;
      if (particles.length > 0 || launches < maxLaunches) {
        fwAnimId = requestAnimationFrame(tick);
      }
    }
    if (fwAnimId) cancelAnimationFrame(fwAnimId);
    tick();
  }

  document.addEventListener('DOMContentLoaded', initGame);
</script>
</body>
</html>
